<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #06b6d4;
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 360px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 0%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px);
        }
        .logo-glyph {
          width: 30px; height: 30px;
          background: var(--gradient);
          border-radius: 10px;
          display: flex; align-items: center; justify-content: center;
          box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
          font-weight: 800; color: white; font-size: 14px;
        }
        .header h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }
        .header h1 span { background: var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .badge {
            margin-left: auto;
            font-size: 0.6rem; font-weight: 800; letter-spacing: 1px;
            background: rgba(139,92,246,0.08); color: var(--primary);
            border: 1px solid rgba(139,92,246,0.15);
            padding: 4px 10px; border-radius: 100px;
            text-transform: uppercase;
        }

        .body { padding: 24px; }

        /* ── Global Elements ── */
        .platform-chip {
            display: flex; align-items: center; gap: 12px;
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 14px 16px; margin-bottom: 24px;
            font-size: 0.85rem; color: var(--text-muted);
            backdrop-filter: blur(10px);
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--success); box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.6; }
        }
        .platform-chip strong { color: white; font-weight: 700; }

        .btn {
            width: 100%; padding: 16px;
            background: var(--gradient);
            color: #fff; border: none; border-radius: 16px;
            font-weight: 800; font-size: 0.95rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 8px 24px -6px rgba(139, 92, 246, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 12px 30px -6px rgba(139, 92, 246, 0.4); }
        .btn:active { transform: translateY(1px); }
        .btn:disabled { opacity: 0.6; cursor: wait; }

        .status {
            margin-top: 20px; font-size: 0.75rem;
            color: var(--text-muted); text-align: center; font-weight: 600;
            letter-spacing: 0.2px;
        }

        /* ── Intelligence Mode Grid ── */
        .context-title {
            font-size: 0.65rem; font-weight: 800; letter-spacing: 1.5px;
            color: var(--text-muted); text-transform: uppercase; margin-bottom: 14px;
            padding-left: 4px;
        }
        .modes {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-bottom: 28px;
        }
        .mode-opt input { display: none; }
        .mode-opt label {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            padding: 14px 8px; border-radius: 16px; cursor: pointer;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.02);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mode-opt input:checked + label {
            border-color: var(--primary);
            background: rgba(139,92,246,0.12);
            box-shadow: inset 0 0 12px rgba(139, 92, 246, 0.1);
        }
        .mode-opt label:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); transform: translateY(-2px); }
        .mode-icon { width: 18px; height: 18px; color: var(--primary); opacity: 0.8; }
        .mode-name { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); }
        .mode-opt input:checked + label .mode-name { color: white; }
        
        .animate-in { animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .error-text {
            color: #fb7185; font-weight: 700; text-align: center;
            background: rgba(251, 113, 133, 0.08); padding: 12px;
            border-radius: 12px; border: 1px solid rgba(251, 113, 133, 0.15);
        }

        .success-badge {
            display: flex; align-items: center; gap: 10px;
            background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.15);
            padding: 14px; border-radius: 16px; color: var(--success);
            font-size: 0.85rem; font-weight: 800; margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-glyph">B</div>
        <h1>Bridge<span>AI</span></h1>
        <span class="badge">PLATFORM</span>
    </div>

    <!-- Main Section -->
    <div class="body animate-in" id="main">
        <div id="quota-tracker" style="margin-bottom: 24px; padding: 14px; background: rgba(0,0,0,0.3); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);">
            <div style="display: flex; justify-content: space-between; font-size: 0.6rem; font-weight: 900; margin-bottom: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px;">
                <span>Vault Capacity</span>
                <span id="quota-text">Syncing...</span>
            </div>
            <div style="height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-bottom: 12px;">
                <div id="quota-bar" style="width: 100%; height: 100%; background: var(--gradient); box-shadow: 0 0 10px rgba(139, 92, 246, 0.2); transition: width 1s;"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.55rem; font-weight: 800; color: rgba(255,255,255,0.25); letter-spacing: 1px;">
                <div>RELAY: <span id="relay-speed" style="color: var(--primary);">-- ms</span></div>
                <div>DENSITY: <span id="intel-density" style="color: var(--secondary);">--</span></div>
            </div>
        </div>
        
        <button id="extract-btn" class="btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Capture Intelligence
        </button>
        
        <p class="status" id="status-text">Hub ready for extraction.</p>
    </div>

    <!-- Result Section -->
    <div class="body" id="result">
        <div class="success-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            <span><strong id="msg-count">0</strong> Messages</span>
        </div>

        <div class="context-title">Save Mode</div>
        <div class="modes">
            <div class="mode-opt">
                <input type="radio" name="summary-mode" id="m-quick" value="quick" checked>
                <label for="m-quick">
                    <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    <span class="mode-name">Fast</span>
                </label>
            </div>
            <div class="mode-opt">
                <input type="radio" name="summary-mode" id="m-dev" value="developer">
                <label for="m-dev">
                    <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>
                    <span class="mode-name">Technical</span>
                </label>
            </div>
            <div class="mode-opt">
                <input type="radio" name="summary-mode" id="m-research" value="research">
                <label for="m-research">
                    <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <span class="mode-name">Research</span>
                </label>
            </div>
            <div class="mode-opt">
                <input type="radio" name="summary-mode" id="m-study" value="study">
                <label for="m-study">
                    <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15z"/></svg>
                    <span class="mode-name">Study</span>
                </label>
            </div>
            <div class="mode-opt">
                <input type="radio" name="summary-mode" id="m-project" value="project">
                <label for="m-project">
                  <svg class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                  <span class="mode-name">Project</span>
                </label>
            </div>
        </div>

        <button id="bridge-btn" class="btn">
            Save to My Account
        </button>
        <p class="status" id="status-text-result">Secure Sync active.</p>
    </div>

    <script src="popup.js"></script>
</body>
</html>
